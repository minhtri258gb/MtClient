<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8" />
	<title>Sprite Editor</title>

	<script src="/lib/jquery/jquery-3.7.1.min.js"></script>
	<link href="/lib/fontawesome-6.7.2/css/all.min.css" type="text/css" rel="stylesheet" />

	<link href="/lib/gridstack-12.3.3/gridstack.min.css" rel="stylesheet"/>
	<script src="/lib/gridstack-12.3.3/gridstack-all.js"></script>

	<style>
		body { margin: 0; height: 100vh; }

		/* GridStack Theme 1 */
		.grid-stack { background: #eee; }
		.grid-stack-item-content {
			color: #2c3e50;
			text-align: center;
			background-color: #a5c1e5;
			border: 2px solid #00000080;
			overflow: hidden !important;

			.grid-stack-item-image {
				width: 92px;
				height: 92px;
			}
			.grid-stack-item-title {
				position: absolute;
				bottom: 10px;
				left: 50%;
				transform: translateX(-50%);
				font-size: x-small;
				font-weight: bold;
				text-shadow: 0 0 5px white;
			}
		}
		.grid-stack-static {
			.grid-stack-item-content { background-color: #f3f3f3; }
		}
	</style>
</head>
<body>

	<div style="height:100%;display:flex;">

		<!-- Main Content -->
		<div style="flex:1;background-color:#ebfcf6;">

			<div>
				<h2 id="assetName">Chọn Asset</h2>
				<canvas id="canvasAsset" width="100" height="100"></canvas>

				<h3>Animation</h3>
				<div id="animationList"></div>
			</div>

			<div>
				<canvas id="canvasResult" style="width:100px;height:100px"></canvas>
			</div>

		</div>

		<!-- Assets Content -->
		<div style="width:400px;background-color:azure;">
			<div>
				<span><h2>Assets</h2></span>
				<button onclick="mt.assets.add()"><i class="fa-solid fa-plus"></i></button>
			</div>
			<div class="grid-stack"></div>
		</div>
	</div>

	<script type="module">
		import mtApi from '/common/api.js';
		import mtFile from '/common/file.js';

		var mt = {
			api: mtApi,
			file: mtFile,

			mgr: {
				d_assets: {},
				d_class: {},
				d_tiles: {},

				async load() {
					let baseFolder = '/2D';

					// Load file assets
					let contentAssets = await mt.file.read('text', baseFolder + '/assets.txt');
					let splitAssets = contentAssets.split('\n'); // Chia thành từng dòng
					// console.log('[mt.mgr.init]', { splitAssets }); // Log

					for (let fileAsset of splitAssets) {
						fileAsset = fileAsset.trim();
						if (fileAsset.length == 0 || fileAsset.startsWith(';')) // Bỏ qua dòng trống và comment
							continue;

						// Lấy folder
						fileAsset = fileAsset.replace('\\', '/'); // Chuyển \ thành /
						let posFolder = fileAsset.lastIndexOf('/');
						let folderAsset = fileAsset.substring(0, posFolder);

						// Đọc dữ liệu sprite
						let packAsset = await mt.file.read('json', baseFolder + fileAsset);
						console.log('[mt.mgr.init]', { packAsset });

						// Load image
						for (let assetId in packAsset.assets) {
							let asset = packAsset.assets[assetId];
							asset.file = baseFolder + folderAsset + asset.file;
							// let linkImage = baseFolder + folderAsset + asset.file;
							// console.log('[mt.mgr.init]', { linkImage }); // Log

							// Load Image
							mt.utils.loadImage(asset.file).then(img => asset.image = img); // Bất đồng bộ để tối ưu
							// asset.image = await mt.utils.loadImage(linkImage); // Đồng bộ
						}

						// Lưu lại
						this.d_assets = Object.assign(this.d_assets, packAsset.assets);
					}

					// Render Assets
					mt.assets.load();
				},
			},
			assets: {
				p_grid: null,

				init() {

					// GridStack
					GridStack.renderCB = (el, w) => el.innerHTML = w.content;
					this.p_grid = GridStack.init({
						column: 4,
						cellHeight: 100,
						staticGrid: true,
						float: false,
						disableResize: true,
						acceptWidgets: true,
						removable: false,
						lazyLoad: true,
						margin: 2,
					});
				},
				load() {

					let listAsset = [];
					for (let assetId in mt.mgr.d_assets) {
						let asset = mt.mgr.d_assets[assetId];

						listAsset.push({
							id: assetId,
							content: `
								<div class="grid-stack-item-image" style="background:url('${asset.file}') no-repeat center / contain;"></div>
								<span class="grid-stack-item-title">${assetId}</span>
							`,
						});
					}
					this.p_grid.load(listAsset);
					console.log('[mt.assets.load]', { listAsset });

					// Register Event
					const elWidgets = this.p_grid.getGridItems();
					for (let elWidget of elWidgets)
						elWidget.addEventListener('click', () => this.onWidgetClick(elWidget));
				},
				add() {

					// Tạo input file ẩn
					const input = document.createElement('input');
					input.type = 'file';

					// Lắng nghe sự kiện chọn file
					input.onchange = e => {
						const file = e.target.files[0];
						console.log({ file });
						// console.log('File đã chọn:', file.name);

						// Đọc file nếu cần
						// const reader = new FileReader();
						// reader.onload = function(event) {
						// 	// console.log('Nội dung file:', event.target.result);
						// };
						// reader.readAsText(file); // hoặc readAsDataURL, readAsArrayBuffer
					};

					// Mở hộp thoại chọn file
					input.click();
				},
				async onWidgetClick(elWidget) {

					// Lấy Id widget
					let assetId = elWidget.getAttribute('gs-id');

					if (assetId == null || assetId.length == 0) {
						console.warn('[mt.assets.onWidgetClick] widget không có id', { assetId, elWidget });
						return; // Bỏ qua các widget ko có id
					}

					// Widget
					// let lstWidget = this.p_grid.getGridItems();
					// let widget = lstWidget.find(item => item.gridstackNode.id === assetId);
					// let asset = widget.gridstackNode.customData;

					// Select
					mt.render.selectAsset(assetId);

					// Log
					// console.log('[mt.assets.onWidgetClick]', { assetId });
				},
			},
			render: {
				c_assetName: null,
				c_canvasAsset: null,
				c_canvasResult: null,
				c_animationList: null,
				p_ctxAsset: null,
				p_ctxResult: null,
				m_lastTime: 0,
				m_fps: 60,

				init() {
					this.c_assetName = document.getElementById('assetName');
					this.c_canvasAsset = document.getElementById('canvasAsset');
					this.c_canvasResult = document.getElementById('canvasResult');
					this.c_animationList = document.getElementById('animationList');
					this.p_ctxAsset = this.c_canvasAsset.getContext('2d');
					this.p_ctxResult = this.c_canvasResult.getContext('2d');
				},
				animate(currentTime) {
					let self = mt.render;
					const deltaTime = currentTime - self.m_lastTime;
					const frameDuration = 1000 / self.fps;

					if (deltaTime >= frameDuration) {
						const col = frameIndex % 6; // #TODO
						const row = Math.floor(frameIndex / 10); // #TODO
						const sx = col * frameWidth;
						const sy = row * frameHeight;
						self.p_ctx.drawImage(
							self.p_image,
							sx, sy, frameWidth, frameHeight,
							dx, dy, destWidth, destHeight
						);
						this.drawFrame(this.currentFrame);
						this.currentFrame = (this.currentFrame + 1) % this.totalFrames;
						this.lastTime = currentTime;
					}

					window.requestAnimationFrame((time) => this.animate(time));
				},
				selectAsset(assetId) {

					// Short
					let asset = mt.mgr.d_assets[assetId];
					let canvas = this.c_canvasAsset;
					let ctx = this.p_ctxAsset;
					let image = asset.image;
					let width = image.naturalWidth;
					let height = image.naturalHeight
					let colWidth = width / asset.column;
					let rowHeight = height / asset.row;

					// UI Change
					this.c_assetName.innerHTML = assetId;
					canvas.width = width;
					canvas.height = height;


					// Render - Image
					// ctx.clearRect(0, 0, width, height);
					ctx.drawImage(image, 0, 0);

					// Render - Grid
					ctx.strokeStyle = 'orange';
					ctx.lineWidth = 1;
					ctx.beginPath();
					for (let i = 1; i < asset.column; i++) {
						const x = i * colWidth;
						ctx.moveTo(x, 0);
						ctx.lineTo(x, canvas.height);
					}
					for (let j = 1; j < asset.row; j++) {
						const y = j * rowHeight;
						ctx.moveTo(0, y);
						ctx.lineTo(canvas.width, y);
					}
					ctx.stroke();

					// Render - Number
					ctx.font = 'bold 12px Arial';
					ctx.fillStyle = '#fff';
					ctx.textAlign = 'center';
					ctx.textBaseline = 'middle';
					ctx.shadowColor = '#000';
					ctx.shadowBlur = 2;
					ctx.shadowOffsetX = 1;
					ctx.shadowOffsetY = 1;
					let index = 1;
					for (let row = 0; row < asset.row; row++) {
						for (let col = 0; col < asset.column; col++) {
							const x = col * colWidth + colWidth / 2;
							const y = row * rowHeight + rowHeight / 2;
							ctx.fillText(index, x, y);
							index++;
						}
					}


					// Animation
					this.c_animationList.innerHTML = '';
					if (asset.anim != null) {
						for (let animId in asset.anim) {
							let anim = asset.anim[animId];

							const elmAnim = document.createElement('div');
							elmAnim.textContent = `
								${animId}
							`;
							elmAnim.style.background = 'lightblue';
							elmAnim.style.padding = '4px';
							// elmAnim.classList.add('item');

							this.c_animationList.appendChild(elmAnim);
						}
					}


					// Log
					console.log('[mt.render.selectAsset]', {
						asset,
						imageSize: width+'x'+height,
						spriteSize: asset.column+'x'+asset.row,
					});
				},
			},
			utils: {
				loadImage(url) {
					return new Promise((resolve, reject) => {
						const img = new Image();
						img.onload = () => resolve(img);
						img.onerror = reject;
						img.src = url;
					});
				},
			},

			async init() {

				// Bind Global
				window.mt = this;

				// Init
				this.assets.init();
				this.render.init();

				// Load
				await this.mgr.load();
			},
		};
		document.addEventListener('DOMContentLoaded', () => mt.init());
	</script>
</body>
</html>
