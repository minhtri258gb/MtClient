<!DOCTYPE html>
<html lang="vi">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>2D Tilemap với Three.js</title>
	<style>
		body {
			margin: 0;
			overflow: hidden;
			font-family: Arial, sans-serif;
		}
		#info {
			position: absolute;
			top: 10px;
			left: 10px;
			color: white;
			background: rgba(0, 0, 0, 0.7);
			padding: 15px;
			border-radius: 8px;
			font-size: 14px;
			z-index: 100;
		}
		#info h3 {
			margin: 0 0 10px 0;
		}
		#info p {
			margin: 5px 0;
		}
	</style>
</head>
<body>
	<div id="info">
		<h3>🗺️ 2D Tilemap</h3>
		<p>🖱️ Kéo chuột để di chuyển</p>
		<p>🔍 Cuộn chuột để zoom</p>
		<p>⌨️ Phím mũi tên để di chuyển</p>
	</div>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
	<script type="module">
		var mt = {

			// Module
			render: {
				m_scene: null,
				m_camera: null,
				m_renderer: null,
				m_tilemap: null,
				m_tileSize: 32,
				m_mapWidth: 20,
				m_mapHeight: 20,
				m_keys: {},
				m_cameraZoom: 1,
				// Camera controls
				m_isDragging: false,
				m_prevMouse: { x: 0, y: 0 },

				// Method
				init() {

					this.m_scene = new THREE.Scene();
					this.m_scene.background = new THREE.Color(0x1a1a2e);

					// Orthographic Camera cho 2D view
					const aspect = window.innerWidth / window.innerHeight;
					const frustumSize = 400;
					this.m_camera = new THREE.OrthographicCamera(
						frustumSize * aspect / -2,
						frustumSize * aspect / 2,
						frustumSize / 2,
						frustumSize / -2,
						1,
						1000
					);
					this.m_camera.position.set(
						(this.m_mapWidth * this.m_tileSize) / 2,
						(this.m_mapHeight * this.m_tileSize) / 2,
						500
					);
					this.m_camera.lookAt((this.m_mapWidth * this.m_tileSize) / 2, (this.m_mapHeight * this.m_tileSize) / 2, 0);

					// Renderer
					this.m_renderer = new THREE.WebGLRenderer({ antialias: true });
					this.m_renderer.setSize(window.innerWidth, window.innerHeight);
					document.body.appendChild(this.m_renderer.domElement);

					// Tạo tilemap
					this.createTilemap();

					// Event listeners
					window.addEventListener('resize', (e) => this.onResize(e));
					window.addEventListener('mousedown', (e) => this.onMouseDown(e));
					window.addEventListener('mousemove', (e) => this.onMouseMove(e));
					window.addEventListener('mouseup', (e) => this.onMouseUp(e));
					window.addEventListener('wheel', (e) => this.onWheel(e));
					window.addEventListener('keydown', e => this.m_keys[e.key] = true);
					window.addEventListener('keyup', e => this.m_keys[e.key] = false);
				},
				createSpritesheet() { // Tạo spritesheet texture bằng canvas
					const canvas = document.createElement('canvas');
					const tilePixelSize = 64;
					const tilesPerRow = 4;
					canvas.width = tilePixelSize * tilesPerRow;
					canvas.height = tilePixelSize * tilesPerRow;
					const ctx = canvas.getContext('2d');

					// Định nghĩa các tile khác nhau
					const tiles = [
						{ color: '#2d5016', name: 'Grass' },
						{ color: '#8b4513', name: 'Dirt' },
						{ color: '#4a90e2', name: 'Water' },
						{ color: '#7f8c8d', name: 'Stone' },
						{ color: '#27ae60', name: 'Forest' },
						{ color: '#f39c12', name: 'Sand' },
						{ color: '#95a5a6', name: 'Rock' },
						{ color: '#e74c3c', name: 'Lava' },
						{ color: '#16a085', name: 'Deep Water' },
						{ color: '#d35400', name: 'Clay' },
						{ color: '#8e44ad', name: 'Crystal' },
						{ color: '#34495e', name: 'Gravel' },
						{ color: '#1abc9c', name: 'Shallow Water' },
						{ color: '#c0392b', name: 'Red Rock' },
						{ color: '#f1c40f', name: 'Gold' },
						{ color: '#ecf0f1', name: 'Snow' }
					];

					// Vẽ từng tile
					tiles.forEach((tile, index) => {
						const x = (index % tilesPerRow) * tilePixelSize;
						const y = Math.floor(index / tilesPerRow) * tilePixelSize;

						// Vẽ màu nền
						ctx.fillStyle = tile.color;
						ctx.fillRect(x, y, tilePixelSize, tilePixelSize);
						
						// Thêm texture pattern
						ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
						for (let i = 0; i < 8; i++) {
							for (let j = 0; j < 8; j++) {
								if (Math.random() > 0.7) {
									ctx.fillRect(
										x + i * 8 + Math.random() * 4,
										y + j * 8 + Math.random() * 4,
										2, 2
									);
								}
							}
						}
						
						// Vẽ viền
						ctx.strokeStyle = 'rgba(0, 0, 0, 0.3)';
						ctx.lineWidth = 2;
						ctx.strokeRect(x + 1, y + 1, tilePixelSize - 2, tilePixelSize - 2);
						
						// Thêm highlight
						ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
						ctx.fillRect(x + 4, y + 4, tilePixelSize / 3, tilePixelSize / 3);
					});

					const texture = new THREE.CanvasTexture(canvas);
					texture.magFilter = THREE.NearestFilter;
					texture.minFilter = THREE.NearestFilter;
					return texture;
				},
				generateMap() { // Tạo bản đồ ngẫu nhiên
					const map = [];
					for (let y = 0; y < this.m_mapHeight; y++) {
						const row = [];
						for (let x = 0; x < this.m_mapWidth; x++) {
							let tileIndex;
							const centerDist = Math.sqrt(
								Math.pow(x - this.m_mapWidth/2, 2) + 
								Math.pow(y - this.m_mapHeight/2, 2)
							);
							
							if (centerDist < 2.5) {
								tileIndex = 2; // Water ở giữa
							} else if (centerDist < 4) {
								tileIndex = 5; // Sand xung quanh water
							} else if (Math.random() > 0.85) {
								tileIndex = 4; // Forest ngẫu nhiên
							} else if (Math.random() > 0.92) {
								tileIndex = 3; // Stone ngẫu nhiên
							} else if (Math.random() > 0.95) {
								tileIndex = 6; // Rock
							} else {
								tileIndex = 0; // Grass
							}
							row.push(tileIndex);
						}
						map.push(row);
					}
					return map;
				},
				createTilemap() {
					const spritesheet = this.createSpritesheet();
					const map = this.generateMap();
					const tilesPerRow = 4;

					this.m_tilemap = new THREE.Group();

					for (let y = 0; y < this.m_mapHeight; y++) {
						for (let x = 0; x < this.m_mapWidth; x++) {
							const tileIndex = map[y][x];
							const tileX = tileIndex % tilesPerRow;
							const tileY = Math.floor(tileIndex / tilesPerRow);

							// Tính toán UV coordinates
							const uvSize = 1 / tilesPerRow;
							const geometry = new THREE.PlaneGeometry(this.m_tileSize, this.m_tileSize);

							// Set UV coordinates cho tile cụ thể
							const uvs = geometry.attributes.uv;
							const u = tileX * uvSize;
							const v = 1 - (tileY + 1) * uvSize;

							uvs.setXY(0, u, v + uvSize);
							uvs.setXY(1, u + uvSize, v + uvSize);
							uvs.setXY(2, u, v);
							uvs.setXY(3, u + uvSize, v);

							const material = new THREE.MeshBasicMaterial({
								map: spritesheet,
								transparent: false
							});

							const tile = new THREE.Mesh(geometry, material);
							tile.position.set(
								x * this.m_tileSize + this.m_tileSize / 2,
								y * this.m_tileSize + this.m_tileSize / 2,
								0
							);
							this.m_tilemap.add(tile);
						}
					}

					this.m_scene.add(this.m_tilemap);
				},
				onMouseDown(e) {
					this.m_isDragging = true;
					this.m_prevMouse = { x: e.clientX, y: e.clientY };
				},
				onMouseMove(e) {
					if (!this.m_isDragging) return;

					const deltaX = e.clientX - this.m_prevMouse.x;
					const deltaY = e.clientY - this.m_prevMouse.y;

					const moveSpeed = 0.5 / this.m_cameraZoom;
					
					this.m_camera.position.x -= deltaX * moveSpeed;
					this.m_camera.position.y += deltaY * moveSpeed;

					this.m_prevMouse = { x: e.clientX, y: e.clientY };
				},
				onMouseUp() {
					this.m_isDragging = false;
				},
				onWheel(e) {
					// e.preventDefault();
					const zoomSpeed = 0.1;
					
					if (e.deltaY > 0) {
						this.m_cameraZoom = Math.max(0.3, this.m_cameraZoom - zoomSpeed);
					} else {
						this.m_cameraZoom = Math.min(3, this.m_cameraZoom + zoomSpeed);
					}
					
					this.updateCameraZoom();
				},
				updateCameraZoom() {
					const aspect = window.innerWidth / window.innerHeight;
					const frustumSize = 400 / this.m_cameraZoom;
					
					this.m_camera.left = frustumSize * aspect / -2;
					this.m_camera.right = frustumSize * aspect / 2;
					this.m_camera.top = frustumSize / 2;
					this.m_camera.bottom = frustumSize / -2;
					this.m_camera.updateProjectionMatrix();
				},
				onResize() {
					const aspect = window.innerWidth / window.innerHeight;
					const frustumSize = 400 / this.m_cameraZoom;

					this.m_camera.left = frustumSize * aspect / -2;
					this.m_camera.right = frustumSize * aspect / 2;
					this.m_camera.top = frustumSize / 2;
					this.m_camera.bottom = frustumSize / -2;
					this.m_camera.updateProjectionMatrix();
					
					this.m_renderer.setSize(window.innerWidth, window.innerHeight);
				},
				handleKeyboard() {
					const moveSpeed = 5;
					
					if (this.m_keys['ArrowUp'] || this.m_keys['w'] || this.m_keys['W']) {
						this.m_camera.position.y += moveSpeed;
					}
					if (this.m_keys['ArrowDown'] || this.m_keys['s'] || this.m_keys['S']) {
						this.m_camera.position.y -= moveSpeed;
					}
					if (this.m_keys['ArrowLeft'] || this.m_keys['a'] || this.m_keys['A']) {
						this.m_camera.position.x -= moveSpeed;
					}
					if (this.m_keys['ArrowRight'] || this.m_keys['d'] || this.m_keys['D']) {
						this.m_camera.position.x += moveSpeed;
					}
				},
				animate() {
					let self = mt.render;
					requestAnimationFrame(self.animate);
					self.handleKeyboard();
					self.m_renderer.render(self.m_scene, self.m_camera);
				}
			},

			// Method
			init() {

				// Bind Global
				window.mt = this;

				// Init
				this.render.init();
				this.render.animate();
			},
		};
		document.addEventListener('DOMContentLoaded', () => mt.init());
	</script>
</body>
</html>
