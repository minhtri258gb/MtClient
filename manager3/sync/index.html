<div style="display:flex;flex-direction:column;height:100%;">

	<!-- Tool -->
	<div>

		<!-- Type -->
		<select id="sync-type" onchange="mt.sync.event.onChangeType()">
			<option value="">Chọn Loại</option>
			<option value="lib">Library</option>
			<option value="music">Music</option>
		</select>

		<!-- Device -->
		<select id="sync-device">
			<option value="home">Home</option>
			<option value="company">Company</option>
		</select>

		<button onclick="mt.sync.event.btnDownload()">Download</button>
		<button>Select File</button>
		<button onclick="mt.sync.event.btnCompare()">Compare</button>

	</div>

	<!-- Content -->
	<div style="flex:1;display:flex;">

		<!-- Content Left -->
		<div style="flex:1;border-right:1px solid;">
			<ol id="sync-list-left"></ol>
		</div>
		<!-- Content Right -->
		<div style="flex:1;border-right:1px solid;">
			<ol id="sync-list-right"></ol>
		</div>
		<!-- Content Compare -->
		<div style="flex:1;display:flex;flex-direction:column;">
			<!-- Add -->
			<div id="sync-compare-top" style="flex:1;"></div>
			<!-- Remove -->
			<div id="sync-compare-bottom" style="flex:1;border-top:1px solid;"></div>
		</div>
	</div>

</div>
