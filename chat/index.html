<!DOCTYPE html>
<html lang="vi">
<head>
	<meta charset="UTF-8">
	<title>ZeroClaw Local Chat</title>
	<style>
		body { font-family: sans-serif; background: #f4f4f9; display: flex; flex-direction: column; height: 100vh; margin: 0; }
		#chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
		.message { max-width: 80%; padding: 10px; border-radius: 10px; line-height: 1.5; }
		.user { align-self: flex-end; background: #007bff; color: white; }
		.ai { align-self: flex-start; background: #e9e9eb; color: #333; }
		#input-area { padding: 20px; background: white; display: flex; gap: 10px; border-top: 1px solid #ddd; }
		input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 5px; outline: none; }
		button { padding: 10px 20px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; }
		button:disabled { background: #ccc; }
	</style>
</head>
<body>

<div id="chat-container">
	<div class="message ai">Xin chào! Tôi là ZeroClaw (Qwen3.5). Tôi có thể giúp gì cho bạn?</div>
</div>

<div id="input-area">
	<input type="text" id="user-input" placeholder="Nhập tin nhắn..." autocomplete="off">
	<button id="send-btn">Gửi</button>
</div>

<script>
	const chatContainer = document.getElementById('chat-container');
	const userInput = document.getElementById('user-input');
	const sendBtn = document.getElementById('send-btn');

	// Cấu hình URL API của ZeroClaw (mặc định)
	const API_URL = "http://localhost:42617/v1/chat/completions"; 

	function addMessage(text, isUser) {
		const div = document.createElement('div');
		div.className = `message ${isUser ? 'user' : 'ai'}`;
		div.innerText = text;
		chatContainer.appendChild(div);
		chatContainer.scrollTop = chatContainer.scrollHeight;
	}

	async function sendMessage() {
		const text = userInput.value.trim();
		if (!text) return;

		addMessage(text, true);
		userInput.value = '';
		sendBtn.disabled = true;

		try {
			const response = await fetch(API_URL, {
				method: 'POST',
				headers: { 'Content-Type': 'application/json' },
				body: JSON.stringify({
					model: "qwen3.5:4b", // Phải khớp với model bạn đang chạy trong Ollama
					messages: [{ role: "user", content: text }]
				})
			});

			const data = await response.json();
			const aiResponse = data.choices[0].message.content;
			addMessage(aiResponse, false);
		} catch (error) {
			addMessage("Lỗi: Không thể kết nối với ZeroClaw. Hãy chắc chắn bạn đã chạy 'zeroclaw daemon'.", false);
			console.error(error);
		} finally {
			sendBtn.disabled = false;
		}
	}

	sendBtn.addEventListener('click', sendMessage);
	userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
</script>

</body>
</html>
